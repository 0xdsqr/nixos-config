name: check

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/flakehub-cache-action@v3.17.0
      - name: Run nixfmt
        run: nix fmt -- --ci -f nixfmt
      - name: Run deadnix
        run: nix fmt -- --ci -f deadnix
      - name: Run statix
        run: nix fmt -- --ci -f statix
      - name: Run flake check
        run: nix flake check --all-systems --no-build
