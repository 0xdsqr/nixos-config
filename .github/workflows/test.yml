name: ci

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  nixfmt:
    name: nixfmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/flakehub-cache-action@v3.17.0
      - name: nixfmt check
        run: nix fmt -- --ci -f nixfmt

  biome:
    name: biome
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/flakehub-cache-action@v3.17.0
      - name: biome check
        run: nix fmt -- --ci -f biome

  deadnix:
    name: deadnix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/flakehub-cache-action@v3.17.0
      - name: deadnix check
        run: nix fmt -- --ci -f deadnix

  statix:
    name: statix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/flakehub-cache-action@v3.17.0
      - name: statix check
        run: nix fmt -- --ci -f statix

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: gofmt check
        run: |
          if [ -n "$(gofmt -l pkgs/sysdsqr-cli)" ]; then
            echo "Go files need formatting:"
            gofmt -d pkgs/sysdsqr-cli
            exit 1
          fi

  test-sysdsqr:
    name: test sysdsqr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: run go tests
        working-directory: pkgs/sysdsqr-cli
        run: go test -v ./...
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/flakehub-cache-action@v3.17.0
      - name: build and verify
        run: |
          nix build .#sysdsqr
          ./result/bin/sysdsqr version
          ./result/bin/sysdsqr info

  eval-configs:
    name: eval configs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: devbox-vm-x86_64
            attr: nixosConfigurations.devbox-vm-x86_64.config.system.build.toplevel
          - name: devbox-usb-x86_64
            attr: nixosConfigurations.devbox-usb-x86_64.config.system.build.toplevel
          - name: dsqr-server-vm-x86_64
            attr: nixosConfigurations.dsqr-server-vm-x86_64.config.system.build.toplevel
          - name: gateway-vm-x86_64
            attr: nixosConfigurations.gateway-vm-x86_64.config.system.build.toplevel
          - name: github-runner-vm-x86_64
            attr: nixosConfigurations.github-runner-vm-x86_64.config.system.build.toplevel
          - name: cellar-vm-x86_64
            attr: nixosConfigurations.cellar-vm-x86_64.config.system.build.toplevel
          - name: media-server-vm-x86_64
            attr: nixosConfigurations.media-server-vm-x86_64.config.system.build.toplevel
          - name: devbox-macbook-pro-m1
            attr: darwinConfigurations.devbox-macbook-pro-m1.system
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/flakehub-cache-action@v3.17.0
      - name: eval ${{ matrix.name }}
        run: nix eval --raw .#${{ matrix.attr }}.drvPath

  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/flakehub-cache-action@v3.17.0
      - name: flake check
        run: nix flake check

  build-sysdsqr:
    name: build sysdsqr
    runs-on: ubuntu-latest
    needs: [test-sysdsqr]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/flakehub-cache-action@v3.17.0
      - name: build sysdsqr
        run: nix build .#sysdsqr

  self-hosted-check:
    name: self-hosted check
    runs-on: [self-hosted, linux, x64, nix, profile-nix]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: nix version
        run: nix --version
      - name: system info
        run: uname -a

  required:
    name: all checks passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - nixfmt
      - biome
      - gofmt
      - deadnix
      - statix
      - eval-configs
      - flake-check
      - build-sysdsqr
      - self-hosted-check
    steps:
      - name: verify all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '(failure|cancelled)'; then
            echo "required jobs failed: $results"
            exit 1
          fi
          echo "all required jobs passed: $results"
