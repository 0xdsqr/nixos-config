name: ci

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  nixfmt:
    name: nixfmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/flakehub-cache-action@v3.17.0
      - name: nixfmt check
        run: nix fmt -- --ci -f nixfmt

  self-hosted-runner-check:
    name: self-hosted runner check
    runs-on:
      - self-hosted
      - linux
      - x64
      - nix
      - profile-nix
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: nix version
        run: nix --version
      - name: system info
        run: uname -a

  github-runner-deploy-check:
    name: github runner deploy check
    runs-on:
      - self-hosted
      - linux
      - x64
      - nix
      - profile-nix
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/flakehub-cache-action@v3.17.0
      - name: eval github runner config
        run: nix eval --raw .#nixosConfigurations.github-runner-vm-x86_64.config.system.build.toplevel.drvPath
      - name: validate deploy context
        run: whoami

  required:
    name: all required checks passed
    needs:
      - nixfmt
      - self-hosted-runner-check
      - github-runner-deploy-check
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: verify all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '(failure|cancelled)'; then
            echo "required jobs failed: $results"
            exit 1
          fi
          echo "all required jobs passed: $results"
