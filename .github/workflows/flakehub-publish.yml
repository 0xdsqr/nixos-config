name: "Publish every Git push to main to FlakeHub"

on:
  push:
    branches:
      - "main"
  workflow_dispatch: {}

jobs:
  flakehub-publish:
    runs-on: "ubuntu-latest"
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: "actions/checkout@v6"
        with:
          persist-credentials: false
      - uses: "DeterminateSystems/determinate-nix-action@v3"
      - name: "Diagnose FlakeHub OIDC exchange"
        shell: bash
        run: |
          set -euo pipefail
          sudo curl --fail --silent --show-error \
            --unix-socket /nix/var/determinate/determinate-nixd.socket \
            --header 'content-type: application/json' \
            --data '{"directives":"determinate_nixd::auth::github_action=trace"}' \
            http://localhost/admin/tracing/directives
          determinate-nixd login github-action || true
          sudo journalctl -u determinate-nixd.service --no-pager --since '2 minutes ago' \
            | grep -Ei 'github_action|response_text|requesting token|error response|authentication mechanism' || true
      - uses: "DeterminateSystems/flakehub-push@main"
        with:
          name: "0xdsqr/nixos-config"
          rolling: true
          visibility: "public"
          include-output-paths: true
