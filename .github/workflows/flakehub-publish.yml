name: "Publish every Git push to main to FlakeHub"

on:
  push:
    branches:
      - "main"
  workflow_dispatch: {}

jobs:
  flakehub-publish:
    runs-on: "ubuntu-latest"
    env:
      # Surface FlakeHub's OIDC exchange response while troubleshooting auth.
      DETERMINATE_NIX_LOG: "determinate_nixd::auth::github_action=trace"
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: "actions/checkout@v6"
        with:
          persist-credentials: false
      - uses: "DeterminateSystems/determinate-nix-action@v3"
      - uses: "DeterminateSystems/flakehub-push@main"
        with:
          name: "0xdsqr/nixos-config"
          rolling: true
          visibility: "public"
          include-output-paths: true
