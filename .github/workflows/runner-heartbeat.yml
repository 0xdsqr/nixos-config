name: runner heartbeat

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 * * * *"
  push:
    branches:
      - main
    paths:
      - .github/workflows/runner-heartbeat.yml
      - machines/github-runner-vm-x86_64.nix
      - modules/nixos/github-runners.nix
      - machines/hardware/vm-x86_64-linux.nix
      - flake.nix
      - justfile

concurrency:
  group: runner-heartbeat
  cancel-in-progress: false

jobs:
  self-hosted-runner-heartbeat:
    name: self-hosted runner heartbeat
    runs-on:
      - self-hosted
      - linux
      - x64
      - nix
      - profile-nix
    permissions:
      contents: read
    steps:
      - name: runner metadata
        run: |
          echo "runner name: $RUNNER_NAME"
          echo "runner os: $RUNNER_OS"
          echo "runner arch: $RUNNER_ARCH"
          date -u
      - name: nix version
        run: nix --version
      - name: system info
        run: uname -a
