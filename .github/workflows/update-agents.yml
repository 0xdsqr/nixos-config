name: update agents

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

concurrency:
  group: update-agents
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3.21.5
      - uses: DeterminateSystems/flakehub-cache-action@v3.21.5
        with:
          flakehub-flake-name: 0xdsqr/nixos-config
          use-gha-cache: disabled
      - name: Verify FlakeHub Cache auth
        run: nix store ping --store https://cache.flakehub.com
      - name: Bump pinned versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run .#update-pins -- all
      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- packages; then
            echo "no version changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          declare -A package_files=(
            [claude-code]="packages/claude-code/package.nix"
            [codex]="packages/codex/cli.nix"
            [codexbar]="packages/codex/bar.nix"
          )
          for pkg in claude-code codex codexbar; do
            file="${package_files[$pkg]}"
            git diff --quiet -- "$file" && continue
            version="$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' "$file" | head -1)"
            git add "$file"
            git commit -m "chore($pkg): bump to $version"
          done
          if ! git diff --quiet -- packages/pi/package.nix; then
            version="$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' packages/pi/package.nix | head -1)"
            git add packages/pi/package.nix
            git commit -m "chore(pi): bump to $version"
          fi
          if ! git diff --quiet -- packages/pi/skills.nix; then
            revision="$(sed -n 's/.*piSkillsRev = "\([^"]*\)".*/\1/p' packages/pi/skills.nix | head -1)"
            git add packages/pi/skills.nix
            git commit -m "chore(pi-skills): bump to ${revision:0:12}"
          fi
          git push
          gh workflow run build-agents.yml --ref main
