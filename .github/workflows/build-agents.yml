name: build agents

on:
  push:
    branches: [main]
    paths:
      - packages/**
      - .github/workflows/build-agents.yml
  workflow_dispatch: {}

concurrency:
  group: build-agents-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.system }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            os: ubuntu-latest
          # aarch64-linux parked: builds fine but never hits FlakeHub Cache on the
          # ubuntu-24.04-arm (public-preview) runner, so it rebuilds ~47 min every
          # run. Determinate docs list aarch64 as supported, so this is likely a
          # preview-runner quirk, not a config error. No host runs this arch;
          # re-enable (and diff the cache diagnostics) to revisit.
          # - system: aarch64-linux
          #   os: ubuntu-24.04-arm
          - system: aarch64-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        if: matrix.system == 'x86_64-linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flakehub-cache-action@v3.20.0
      - name: Build and cache agent packages
        run: |
          packages=(claude-code codex pi pi-skills)
          if [ "${{ matrix.system }}" = "aarch64-darwin" ]; then
            packages+=(codexbar)
          fi
          targets=()
          for pkg in "${packages[@]}"; do
            targets+=(".#packages.${{ matrix.system }}.$pkg")
          done
          nix build --accept-flake-config --print-out-paths "${targets[@]}"
