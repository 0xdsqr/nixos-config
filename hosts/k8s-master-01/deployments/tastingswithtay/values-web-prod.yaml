fullnameOverride: twt-web

image:
  repository: ghcr.io/0xdsqr/tastingswithtay-web
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-creds

env:
  BASE_URL: https://tastingswithtay.com
  DISCORD_CLIENT_ID: "1465977766485688370"
  TRUSTED_ORIGINS: https://tastingswithtay.com

existingSecret: twt-secrets

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: tastingswithtay.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 1Gi
  limits:
    cpu: 500m
    memory: 2Gi

