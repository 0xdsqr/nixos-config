fullnameOverride: dotdev-studio

image:
  repository: ghcr.io/0xdsqr/dotdev-studio
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-creds

env:
  BASE_URL: https://studio.dsqr.dev
  TRUSTED_ORIGINS: https://studio.dsqr.dev,https://dsqr.dev
  S3_BUCKET: dsqr-dotdev
  S3_ENDPOINT: s3.dsqr.dev
  S3_USE_SSL: "true"
  S3_FORCE_PATH_STYLE: "true"
  S3_REGION: us-east-1

existingSecret: dotdev-studio-secrets

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: studio.dsqr.dev
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 1Gi
  limits:
    cpu: 500m
    memory: 2Gi
